              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </button>
          <button id="btn-download-panel"
            class="flex-1 flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 active:scale-[.98] text-white font-semibold py-3.5 rounded-2xl shadow-lg shadow-brand-500/30 text-sm transition-all">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            <span data-i18n="btn_download_full"></span>
          </button>
        </div>
      </div>

    </aside>

    <!-- RIGHT — PREVIEW A4 -->
    <section class="flex-1 min-w-0 fade-in" style="animation-delay:.12s">
      <div class="sticky top-[53px] z-30 bg-slate-50 dark:bg-slate-950 pb-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
          <span class="text-xs font-medium text-slate-500 dark:text-slate-400" data-i18n="preview_live"></span>
          <span class="hidden dark:inline text-xs text-slate-400 dark:text-slate-500" data-i18n="pdf_white_notice"></span>
        </div>
        <span class="text-xs text-slate-400 dark:text-slate-500" data-i18n="preview_format"></span>
      </div>
      <div class="overflow-hidden">
        <div id="preview-scaler" class="mx-auto" style="width:794px;">
          <div id="pages-container" style="display:flex;flex-direction:column;gap:12px;"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="w-full mt-8 pb-6 flex justify-center">
    <a href="https://github.com/uolaV" target="_blank" rel="noopener noreferrer" class="group inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100 hover:border-slate-400 dark:hover:border-slate-500 transition-all duration-200 text-xs font-medium select-none">
      <svg class="w-3.5 h-3.5 opacity-60 group-hover:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
      </svg>
      <span>Made by <span class="font-semibold text-slate-700 dark:text-slate-200 group-hover:text-[var(--c-brand)] transition-colors">uolaV</span></span>
    </a>
  </footer>

  <!-- TOAST -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true">
    <div class="flex items-center gap-2 bg-slate-800 dark:bg-slate-700 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl dark:shadow-black/40 dark:border dark:border-slate-600">
      <svg class="w-4 h-4 text-emerald-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      <span id="toast-msg"></span>
    </div>
  </div>

  <!-- COUNTRY MODAL -->
  <div id="country-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div id="country-modal-backdrop"
      class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 cursor-pointer"></div>
    <div id="country-modal-content"
      class="relative bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm shadow-2xl dark:shadow-black/60 scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[85vh] dark:border dark:border-slate-700">
      <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between shrink-0">
        <h3 class="font-bold text-slate-800 dark:text-slate-100 text-sm" data-i18n="select_country">Pays et Fiscalité</h3>
        <button id="btn-close-country-modal"
          class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600 transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="px-3 pt-2 pb-1 shrink-0 relative z-20 bg-white dark:bg-slate-800">
        <input id="country-search" type="text" autocomplete="off" spellcheck="false"
          class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 outline-none focus:border-brand-400 dark:focus:border-brand-500 focus:ring-1 focus:ring-brand-400/30 transition-colors"
          data-i18n-placeholder="search_country" placeholder="Rechercher un pays..." />
      </div>
      <div id="country-modal-list" class="px-2 pb-2 overflow-y-auto flex-1 grid gap-1 dark:bg-slate-800">
        <!-- injected by JS -->
      </div>
    </div>
  </div>

  <!-- LANGUAGE MODAL -->
  <div id="lang-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div id="lang-modal-backdrop"
      class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 cursor-pointer"></div>
    <div id="lang-modal-content"
      class="relative bg-white dark:bg-slate-800 rounded-2xl w-full max-w-xs shadow-2xl dark:shadow-black/60 scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[85vh] dark:border dark:border-slate-700">
      <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between shrink-0">
        <h3 class="font-bold text-slate-800 dark:text-slate-100 text-sm" data-i18n="select_lang">Langue d'affichage</h3>
        <button id="btn-close-lang-modal"
          class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600 transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div id="lang-modal-list" class="p-2 overflow-y-auto flex-1 grid gap-1 dark:bg-slate-800">
        <!-- injected by buildLangSelect() -->
      </div>
    </div>
  </div>

  <!-- HISTORY MODAL -->
  <div id="history-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div id="history-modal-backdrop"
      class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity opacity-0 cursor-pointer"></div>
    <div id="history-modal-content"
      class="relative bg-white dark:bg-slate-800 rounded-2xl w-full max-w-lg shadow-2xl dark:shadow-black/60 scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[85vh] dark:border dark:border-slate-700">
      <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between shrink-0">
        <h3 class="font-bold text-slate-800 dark:text-slate-100 text-sm" data-i18n="history_title">History</h3>
        <button id="btn-close-history-modal"
          class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-400 dark:text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600 transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="px-3 pt-2.5 pb-1.5 border-b border-slate-100 dark:border-slate-700 shrink-0">
        <input id="history-search" type="search" placeholder="Rechercher…"
          class="w-full text-sm px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-slate-100 outline-none focus:ring-2 focus:ring-brand-400 dark:focus:ring-brand-600 placeholder-slate-400 dark:placeholder-slate-500" />
      </div>
      <div id="history-modal-list" class="p-3 overflow-y-auto flex-1 flex flex-col gap-2 dark:bg-slate-800">
        <!-- injected by JS -->
      </div>
      <div class="px-3 py-2.5 border-t border-slate-100 dark:border-slate-700 shrink-0">
        <button id="btn-export-history-csv"
          class="w-full flex items-center justify-center gap-2 text-xs font-medium text-slate-500 dark:text-slate-400 hover:text-brand-600 dark:hover:text-brand-400 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg py-1.5 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          <span data-i18n="history_export_csv">Export CSV</span>
        </button>
      </div>
    </div>
  </div>

  <script src="countries.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>

</html>
